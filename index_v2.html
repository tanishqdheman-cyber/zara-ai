<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zara AI" />
  <title>Zara AI Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #0f0f1a; --accent: #00d4aa;
      --accent2: #0099ff; --warn: #ff6b6b; --yellow: #ffd93d;
      --text: #e8e8f0; --muted: rgba(255,255,255,0.3); --border: rgba(255,255,255,0.08);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Sora', sans-serif; overflow: hidden; }
    #app { height: 100dvh; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; }

    /* ── HEADER ── */
    .header { padding: 16px 16px 12px; background: linear-gradient(180deg, var(--surface) 0%, transparent 100%); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .avatar { width: 42px; height: 42px; border-radius: 13px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; animation: pulse-glow 3s infinite; }
    .header-info h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .header-info p { font-size: 11px; color: var(--accent); font-family: 'Space Mono', monospace; margin-top: 2px; }
    .dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse-glow 2s infinite; }
    .modes { display: flex; gap: 6px; }
    .mode-btn { flex: 1; padding: 7px 2px; border-radius: 10px; border: 1.5px solid var(--border); background: rgba(255,255,255,0.04); color: var(--muted); font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
    .mode-btn.active-chat   { border-color: var(--accent); color: var(--accent); background: rgba(0,212,170,0.12); }
    .mode-btn.active-search { border-color: var(--warn);   color: var(--warn);   background: rgba(255,107,107,0.12); }
    .mode-btn.active-study  { border-color: var(--yellow); color: var(--yellow); background: rgba(255,217,61,0.12); }
    .mode-btn.active-voice  { border-color: #00c8ff; color: #00c8ff; background: rgba(0,200,255,0.12); }

    /* ── CHAT AREA ── */
    .messages { flex: 1; overflow-y: auto; padding: 14px 14px 6px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .messages::-webkit-scrollbar { display: none; }
    .msg-row { display: flex; animation: fadeUp 0.25s ease; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }
    .bubble { max-width: 82%; padding: 10px 13px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
    .bubble.user { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; border-bottom-right-radius: 4px; font-weight: 500; }
    .bubble.assistant { background: rgba(255,255,255,0.06); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
    .mode-tag { font-size: 10px; font-family: 'Space Mono', monospace; opacity: 0.45; margin-top: 4px; text-align: right; }
    .typing-row { display: flex; justify-content: flex-start; animation: fadeUp 0.25s ease; }
    .typing-bubble { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
    .dot-bounce { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: bounce 1s ease-in-out infinite; }
    .dot-bounce:nth-child(2) { animation-delay: 0.2s; }
    .dot-bounce:nth-child(3) { animation-delay: 0.4s; }

    /* ── INPUT ── */
    .input-area { padding: 10px 14px 22px; flex-shrink: 0; background: linear-gradient(0deg, var(--surface) 0%, transparent 100%); }
    .input-row { display: flex; align-items: flex-end; gap: 10px; background: rgba(255,255,255,0.06); border: 1.5px solid var(--border); border-radius: 16px; padding: 10px 12px; transition: border-color 0.2s; }
    .input-row:focus-within { border-color: var(--accent); }
    .input-row textarea { flex: 1; background: none; border: none; outline: none; color: #fff; font-family: 'Sora', sans-serif; font-size: 15px; resize: none; max-height: 90px; min-height: 22px; line-height: 1.5; -webkit-appearance: none; }
    .input-row textarea::placeholder { color: var(--muted); }
    .send-btn { width: 38px; height: 38px; border-radius: 11px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.35; }
    .hint { text-align: center; font-size: 10px; color: rgba(255,255,255,0.18); margin-top: 7px; font-family: 'Space Mono', monospace; }

    /* ── VOICE PANEL ── */
    #voice-panel {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; flex: 1;
      background: radial-gradient(ellipse at center, #001a2e 0%, #000 70%);
      position: relative; overflow: hidden; padding: 16px;
    }
    #voice-panel.active { display: flex; }

    /* background rings */
    #voice-panel::before, #voice-panel::after {
      content: ''; position: absolute; border-radius: 50%;
      border: 1px solid rgba(0,200,255,0.08);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      animation: pulse-ring 4s ease-in-out infinite;
    }
    #voice-panel::before { width: 320px; height: 320px; }
    #voice-panel::after  { width: 460px; height: 460px; animation-delay: 1.5s; }

    .j-title { font-family: 'Orbitron', monospace; color: #00c8ff; font-size: 1.3rem; letter-spacing: 6px; text-shadow: 0 0 20px rgba(0,200,255,0.9); margin-bottom: 2px; position: relative; z-index: 2; }
    .j-sub   { font-family: 'Rajdhani', sans-serif; color: rgba(0,200,255,0.4); font-size: 0.6rem; letter-spacing: 4px; margin-bottom: 14px; position: relative; z-index: 2; }

    /* voice chat history */
    #j-history {
      width: 100%; max-width: 440px; height: 190px;
      overflow-y: auto;
      background: rgba(0,15,35,0.85);
      border: 1px solid rgba(0,200,255,0.25);
      border-radius: 6px; padding: 10px;
      margin-bottom: 14px; position: relative; z-index: 2;
      scrollbar-width: thin; scrollbar-color: #00c8ff #001020;
    }
    #j-history::-webkit-scrollbar { width: 3px; }
    #j-history::-webkit-scrollbar-thumb { background: #00c8ff; border-radius: 2px; }
    .j-log-label { font-family: 'Orbitron', monospace; color: rgba(0,200,255,0.35); font-size: 0.48rem; letter-spacing: 3px; border-bottom: 1px solid rgba(0,200,255,0.15); padding-bottom: 5px; margin-bottom: 8px; }

    .jmsg { display: flex; flex-direction: column; margin-bottom: 10px; animation: fadeUp 0.3s ease; }
    .jmsg.ju { align-items: flex-end; }
    .jmsg.jb { align-items: flex-start; }
    .jlbl { font-family: 'Orbitron', monospace; font-size: 0.45rem; letter-spacing: 2px; color: rgba(0,200,255,0.45); margin-bottom: 3px; }
    .jbub { max-width: 88%; padding: 7px 11px; font-size: 0.82rem; line-height: 1.45; border-radius: 4px; }
    .ju .jbub { background: rgba(0,200,255,0.12); border: 1px solid rgba(0,200,255,0.35); color: #b0eeff; border-radius: 4px 4px 0 4px; }
    .jb .jbub { background: rgba(0,30,55,0.9); border: 1px solid rgba(0,200,255,0.18); color: #00d8ff; border-radius: 4px 4px 4px 0; text-shadow: 0 0 8px rgba(0,200,255,0.25); }
    .jtime { font-size: 0.48rem; color: rgba(0,200,255,0.28); margin-top: 2px; }

    /* orb */
    .orb-wrap { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; z-index: 2; }
    .orb-ring { position: absolute; width: 88px; height: 88px; border-radius: 50%; border: 1px solid rgba(0,200,255,0.18); pointer-events: none; animation: orb-expand 2.2s ease-out infinite; }
    .orb-ring:nth-child(2) { animation-delay: 0.8s; }
    @keyframes orb-expand { 0% { transform: scale(0.9); opacity: 0.7; } 100% { transform: scale(2); opacity: 0; } }

    #j-mic-btn {
      width: 70px; height: 70px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(0,200,255,0.25), rgba(0,40,70,0.95));
      border: 2px solid rgba(0,200,255,0.55);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; transition: all 0.3s;
      box-shadow: 0 0 18px rgba(0,200,255,0.25); outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    #j-mic-btn.on {
      background: radial-gradient(circle at 35% 35%, rgba(255,60,60,0.35), rgba(70,0,0,0.95));
      border-color: rgba(255,90,90,0.75);
      box-shadow: 0 0 28px rgba(255,60,60,0.45);
      animation: jlisten 0.9s ease-in-out infinite;
    }
    @keyframes jlisten { 0%,100% { transform: scale(1); } 50% { transform: scale(1.09); } }

    #j-status { margin-top: 8px; font-family: 'Orbitron', monospace; font-size: 0.56rem; letter-spacing: 3px; color: rgba(0,200,255,0.55); text-transform: uppercase; min-height: 16px; position: relative; z-index: 2; text-align: center; }

    .wave-bars { display: none; gap: 3px; align-items: center; height: 16px; margin-top: 6px; position: relative; z-index: 2; }
    .wave-bars.on { display: flex; }
    .wbar { width: 3px; background: #00c8ff; border-radius: 2px; animation: wave 0.8s ease-in-out infinite; }
    .wbar:nth-child(1){height:4px;} .wbar:nth-child(2){height:11px;animation-delay:.1s;}
    .wbar:nth-child(3){height:16px;animation-delay:.2s;} .wbar:nth-child(4){height:11px;animation-delay:.3s;}
    .wbar:nth-child(5){height:4px;animation-delay:.4s;}
    @keyframes wave { 0%,100%{transform:scaleY(0.5);} 50%{transform:scaleY(1);} }

    #j-clear-btn { background: transparent; border: 1px solid rgba(255,60,60,0.28); color: rgba(255,80,80,0.55); padding: 5px 14px; font-family: 'Orbitron', monospace; font-size: 0.48rem; letter-spacing: 2px; cursor: pointer; border-radius: 3px; margin-top: 8px; transition: all 0.3s; position: relative; z-index: 2; -webkit-tap-highlight-color: transparent; }
    #j-clear-btn:active { border-color: rgba(255,80,80,0.7); color: rgba(255,100,100,0.9); }

    /* ── ANIMATIONS ── */
    @keyframes pulse-glow  { 0%,100%{box-shadow:0 0 0 0 rgba(0,212,170,0.4);} 50%{box-shadow:0 0 0 8px rgba(0,212,170,0);} }
    @keyframes bounce      { 0%,80%,100%{transform:scale(0.7);opacity:0.5;} 40%{transform:scale(1.2);opacity:1;} }
    @keyframes fadeUp      { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
    @keyframes pulse-ring  { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.4;} 50%{transform:translate(-50%,-50%) scale(1.06);opacity:0.9;} }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="avatar">🤖</div>
      <div class="header-info">
        <h1>Zara AI Agent</h1>
        <p><span class="dot"></span>Online • Ready</p>
      </div>
    </div>
    <div class="modes">
      <button class="mode-btn active-chat" data-mode="chat"   onclick="setMode('chat')">💬 Chat</button>
      <button class="mode-btn"             data-mode="search" onclick="setMode('search')">🔍 Search</button>
      <button class="mode-btn"             data-mode="study"  onclick="setMode('study')">📚 Study</button>
      <button class="mode-btn"             data-mode="voice"  onclick="setMode('voice')">🎙️ Voice</button>
    </div>
  </div>

  <!-- NORMAL CHAT MESSAGES -->
  <div class="messages" id="messages"></div>

  <!-- JARVIS VOICE PANEL -->
  <div id="voice-panel">
    <p class="j-title">J.A.R.V.I.S</p>
    <p class="j-sub">DESI VOICE ASSISTANT</p>

    <div id="j-history">
      <div class="j-log-label">// CONVERSATION LOG //</div>
      <div id="j-msgs">
        <div class="jmsg jb">
          <span class="jlbl">JARVIS</span>
          <div class="jbub">Namaste! Main Jarvis hoon. Mic dabao aur kuch bhi poochho — main bol ke jawab dunga! 🎙️</div>
          <span class="jtime">SYSTEM ONLINE</span>
        </div>
      </div>
    </div>

    <div class="orb-wrap">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <button id="j-mic-btn">🎙️</button>
    </div>

    <div id="j-status">MIC DABAO</div>
    <div class="wave-bars" id="j-wave">
      <div class="wbar"></div><div class="wbar"></div>
      <div class="wbar"></div><div class="wbar"></div>
      <div class="wbar"></div>
    </div>
    <button id="j-clear-btn">⚠ CLEAR LOG</button>
  </div>

  <!-- TEXT INPUT -->
  <div class="input-area" id="text-input-area">
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Kuch bhi poochho..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
    <p class="hint">Tap ➤ to send</p>
  </div>

</div><!-- #app -->

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const GROQ_KEY = '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';
const API_URL  = 'https://api.groq.com/openai/v1/chat/completions';
const MODEL    = 'llama-3.3-70b-versatile';

// System prompt for normal chat
const ZARA_SYS = `Tu ek helpful AI agent hai jiska naam Zara hai.
Tu Hindi aur English dono mein baat kar sakta hai.
Simple, friendly aur clear jawab de. Emojis thoda use kar.`;

// System prompt for Jarvis voice — real AI answers, desi style
const JARVIS_SYS = `Tu ek desi Jarvis voice assistant hai — bilkul Tony Stark ke Jarvis jaisa but Hindi mein.
Tu Groq AI se powered hai. Har sawaal ka REAL aur ACCURATE jawab de.
Jawab short rakho — 2-3 sentences max — kyunki yeh voice se bola jayega.
Hindi aur English mix (Hinglish) mein jawab de.
Friendly aur confident tone rakho. "Sir" ya "Boss" bolke address karo.
Emojis mat use karo (voice mein acha nahi lagta).`;

// ═══════════════════════════════════════════
//  MODE SWITCHING
// ═══════════════════════════════════════════
let currentMode = 'chat';
const placeholders = { chat:'Kuch bhi poochho...', search:'Kya search karein?', study:'Kya padhai karni hai?' };
const modeLabels  = { chat:'💬 Chat', search:'🔍 Search', study:'📚 Study', voice:'🎙️ Voice' };

function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.className = 'mode-btn';
    if (b.dataset.mode === m) b.classList.add('active-' + m);
  });
  const vp  = document.getElementById('voice-panel');
  const msg = document.getElementById('messages');
  const ia  = document.getElementById('text-input-area');
  if (m === 'voice') {
    vp.classList.add('active');
    msg.style.display = 'none';
    ia.style.display  = 'none';
  } else {
    vp.classList.remove('active');
    msg.style.display = 'flex';
    ia.style.display  = 'block';
    document.getElementById('input').placeholder = placeholders[m];
  }
}

// ═══════════════════════════════════════════
//  NORMAL CHAT (Zara)
// ═══════════════════════════════════════════
let isLoading = false;

window.onload = () => {
  addMsg('assistant', '👋 Salaam! Main <strong>Zara</strong> hoon — tera personal AI agent!\n\n💬 <strong>Chat</strong> — koi bhi sawaal\n🔍 <strong>Search</strong> — info dhundho\n📚 <strong>Study</strong> — padhai help\n🎙️ <strong>Voice</strong> — Jarvis se baat karo\n\nShuru karo! 🚀');
  initJarvis();
};

function addMsg(role, content, mode) {
  const box = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const bub = document.createElement('div');
  bub.className = 'bubble ' + role;
  bub.innerHTML = content.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  if (role === 'user' && mode) {
    const tag = document.createElement('div');
    tag.className = 'mode-tag';
    tag.textContent = modeLabels[mode];
    bub.appendChild(tag);
  }
  row.appendChild(bub);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'typing-row'; row.id = 'typing';
  row.innerHTML = '<div class="typing-bubble"><div class="dot-bounce"></div><div class="dot-bounce"></div><div class="dot-bounce"></div></div>';
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

async function callGroq(systemPrompt, userText) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+GROQ_KEY },
    body: JSON.stringify({
      model: MODEL,
      messages: [
        { role:'system', content: systemPrompt },
        { role:'user',   content: userText }
      ],
      max_tokens: 500,
      temperature: 0.7
    })
  });
  const data = await res.json();
  return data.choices?.[0]?.message?.content || 'Kuch galat hua, dobara try karo.';
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text  = input.value.trim();
  if (!text || isLoading) return;
  addMsg('user', text, currentMode);
  input.value = ''; input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();
  const hint = currentMode === 'study'
    ? ' Study help chahiye, clearly explain karo with examples aur points.'
    : currentMode === 'search'
    ? ' Latest accurate info do.'
    : '';
  try {
    const reply = await callGroq(ZARA_SYS + hint, text);
    hideTyping();
    addMsg('assistant', reply);
  } catch(e) {
    hideTyping();
    addMsg('assistant', 'Internet check karo aur dobara try karo. ⚠️');
  }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) {
    e.preventDefault(); sendMessage();
  }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 90) + 'px';
}

// ═══════════════════════════════════════════
//  JARVIS VOICE MODE
// ═══════════════════════════════════════════
function initJarvis() {
  const msgsEl  = document.getElementById('j-msgs');
  const histEl  = document.getElementById('j-history');
  const micBtn  = document.getElementById('j-mic-btn');
  const statEl  = document.getElementById('j-status');
  const waveEl  = document.getElementById('j-wave');
  const clrBtn  = document.getElementById('j-clear-btn');
  let listening = false;
  let jBusy     = false;

  // ── SPEAK (Jarvis awaaz) ──
  function jarvisSpeak(text, onDone) {
    if (!window.speechSynthesis) { onDone && onDone(); return; }
    window.speechSynthesis.cancel();

    // Emojis aur symbols hata do bolne se pehle
    const clean = text.replace(/[\u{1F300}-\u{1FFFF}]/gu, '')
                      .replace(/[*_~`#]/g, '')
                      .trim();

    const u = new SpeechSynthesisUtterance(clean);
    u.pitch  = 0.72;
    u.rate   = 0.88;
    u.volume = 1;

    // Best male voice select karo
    const voices = window.speechSynthesis.getVoices();
    const pick = voices.find(v =>
      v.name.includes('Google UK English Male') ||
      v.name.includes('David')   ||
      v.name.includes('Daniel')  ||
      v.name.includes('Male')
    ) || voices.find(v => v.lang.startsWith('en'));
    if (pick) u.voice = pick;

    u.onend = () => { onDone && onDone(); };
    window.speechSynthesis.speak(u);
  }

  // ── ADD MESSAGE to voice history ──
  function addJ(text, who) {
    const t   = new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
    const div = document.createElement('div');
    div.className = `jmsg ${who === 'user' ? 'ju' : 'jb'}`;
    div.innerHTML = `
      <span class="jlbl">${who === 'user' ? 'TUM' : 'JARVIS'}</span>
      <div class="jbub">${text}</div>
      <span class="jtime">${t}</span>`;
    msgsEl.appendChild(div);
    histEl.scrollTop = histEl.scrollHeight;
  }

  // ── ASK GROQ, then SPEAK ──
  async function jarvisAnswer(question) {
    jBusy = true;
    statEl.textContent = 'SOC RAHA HOON...';

    addJ(question, 'user');

    try {
      const reply = await callGroq(JARVIS_SYS, question);
      addJ(reply, 'jarvis');
      statEl.textContent = 'BOL RAHA HOON...';
      jarvisSpeak(reply, () => {
        statEl.textContent = 'MIC DABAO';
        jBusy = false;
      });
    } catch(e) {
      const err = 'Sorry boss, internet se connect nahi ho pa raha.';
      addJ(err, 'jarvis');
      jarvisSpeak(err, () => {
        statEl.textContent = 'MIC DABAO';
        jBusy = false;
      });
    }
  }

  // ── SPEECH RECOGNITION ──
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    micBtn.style.opacity = '0.4';
    statEl.textContent   = 'BROWSER SUPPORT NAHI';
    return;
  }

  const rec = new SR();
  rec.continuous      = false;
  rec.interimResults  = false;
  rec.lang            = 'hi-IN';   // Hindi pehle, English bhi samjhega

  rec.onstart = () => {
    listening = true;
    micBtn.classList.add('on');
    micBtn.textContent  = '🔴';
    statEl.textContent  = 'SUN RAHA HOON...';
    waveEl.classList.add('on');
  };

  rec.onresult = (e) => {
    const transcript = e.results[0][0].transcript.trim();
    if (transcript) jarvisAnswer(transcript);
  };

  rec.onerror = (e) => {
    statEl.textContent = 'ERROR: ' + e.error.toUpperCase();
    resetMic();
  };

  rec.onend = resetMic;

  micBtn.addEventListener('click', () => {
    if (jBusy) return;          // jawab aa raha hai, wait karo
    if (listening) { rec.stop(); return; }
    try { rec.start(); } catch(e) { console.log(e); }
  });

  function resetMic() {
    listening = false;
    micBtn.classList.remove('on');
    micBtn.textContent = '🎙️';
    waveEl.classList.remove('on');
    if (!jBusy) statEl.textContent = 'MIC DABAO';
  }

  // ── CLEAR LOG ──
  clrBtn.addEventListener('click', () => {
    msgsEl.innerHTML = '';
    const m = 'Log saaf ho gaya boss. Phir se shuru karte hain.';
    addJ(m, 'jarvis');
    jarvisSpeak(m);
  });

  // Voices preload
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
</script>
</body>
</html>
