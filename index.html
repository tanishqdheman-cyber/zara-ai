<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zara AI" />
  <title>Zara AI Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #0f0f1a; --accent: #00d4aa;
      --accent2: #0099ff; --warn: #ff6b6b; --yellow: #ffd93d;
      --text: #e8e8f0; --muted: rgba(255,255,255,0.3); --border: rgba(255,255,255,0.08);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Sora', sans-serif; overflow: hidden; }
    #app { height: 100dvh; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; }

    .header { padding: 16px 16px 12px; background: linear-gradient(180deg, var(--surface) 0%, transparent 100%); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .avatar { width: 42px; height: 42px; border-radius: 13px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; animation: pulse-glow 3s infinite; }
    .header-info h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .header-info p { font-size: 11px; color: var(--accent); font-family: 'Space Mono', monospace; margin-top: 2px; }
    .dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse-glow 2s infinite; }
    .modes { display: flex; gap: 6px; }
    .mode-btn { flex: 1; padding: 7px 2px; border-radius: 10px; border: 1.5px solid var(--border); background: rgba(255,255,255,0.04); color: var(--muted); font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
    .mode-btn.active-chat   { border-color: var(--accent); color: var(--accent); background: rgba(0,212,170,0.12); }
    .mode-btn.active-search { border-color: var(--warn);   color: var(--warn);   background: rgba(255,107,107,0.12); }
    .mode-btn.active-study  { border-color: var(--yellow); color: var(--yellow); background: rgba(255,217,61,0.12); }
    .mode-btn.active-voice  { border-color: #00c8ff; color: #00c8ff; background: rgba(0,200,255,0.12); }

    .messages { flex: 1; overflow-y: auto; padding: 14px 14px 6px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .messages::-webkit-scrollbar { display: none; }
    .msg-row { display: flex; animation: fadeUp 0.25s ease; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }
    .bubble { max-width: 82%; padding: 10px 13px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
    .bubble.user { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; border-bottom-right-radius: 4px; font-weight: 500; }
    .bubble.assistant { background: rgba(255,255,255,0.06); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
    .mode-tag { font-size: 10px; font-family: 'Space Mono', monospace; opacity: 0.45; margin-top: 4px; text-align: right; }
    .typing-row { display: flex; justify-content: flex-start; animation: fadeUp 0.25s ease; }
    .typing-bubble { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
    .dot-bounce { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: bounce 1s ease-in-out infinite; }
    .dot-bounce:nth-child(2) { animation-delay: 0.2s; }
    .dot-bounce:nth-child(3) { animation-delay: 0.4s; }

    .input-area { padding: 10px 14px 22px; flex-shrink: 0; background: linear-gradient(0deg, var(--surface) 0%, transparent 100%); }
    .input-row { display: flex; align-items: flex-end; gap: 10px; background: rgba(255,255,255,0.06); border: 1.5px solid var(--border); border-radius: 16px; padding: 10px 12px; transition: border-color 0.2s; }
    .input-row:focus-within { border-color: var(--accent); }
    .input-row textarea { flex: 1; background: none; border: none; outline: none; color: #fff; font-family: 'Sora', sans-serif; font-size: 15px; resize: none; max-height: 90px; min-height: 22px; line-height: 1.5; -webkit-appearance: none; }
    .input-row textarea::placeholder { color: var(--muted); }
    .send-btn { width: 38px; height: 38px; border-radius: 11px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .hint { text-align: center; font-size: 10px; color: rgba(255,255,255,0.18); margin-top: 7px; font-family: 'Space Mono', monospace; }

    /* VOICE PANEL */
    #voice-panel { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; background: #000; position: relative; overflow: hidden; padding: 20px; }
    #voice-panel.active { display: flex; }
    #voice-panel::before { content: ''; position: absolute; width: 300px; height: 300px; border-radius: 50%; border: 1px solid rgba(0,200,255,0.1); top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse-ring 4s ease-in-out infinite; }
    @keyframes pulse-ring { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; } }

    .jarvis-title { font-family: 'Orbitron', monospace; color: #00c8ff; font-size: 1.4rem; letter-spacing: 6px; text-shadow: 0 0 20px rgba(0,200,255,0.8); margin-bottom: 4px; position: relative; z-index: 2; }
    .jarvis-subtitle { font-family: 'Rajdhani', sans-serif; color: rgba(0,200,255,0.4); font-size: 0.65rem; letter-spacing: 3px; margin-bottom: 16px; position: relative; z-index: 2; }

    #jarvis-chat-history { width: 100%; max-width: 440px; height: 200px; overflow-y: auto; background: rgba(0,20,40,0.8); border: 1px solid rgba(0,200,255,0.3); border-radius: 4px; padding: 12px; margin-bottom: 14px; position: relative; z-index: 2; scrollbar-width: thin; scrollbar-color: #00c8ff #001428; }
    #jarvis-chat-history::-webkit-scrollbar { width: 4px; }
    #jarvis-chat-history::-webkit-scrollbar-thumb { background: #00c8ff; border-radius: 2px; }
    .chat-header-log { font-family: 'Orbitron', monospace; color: rgba(0,200,255,0.4); font-size: 0.5rem; letter-spacing: 3px; border-bottom: 1px solid rgba(0,200,255,0.2); padding-bottom: 6px; margin-bottom: 10px; }
    .jmsg { display: flex; flex-direction: column; margin-bottom: 10px; animation: fadeUp 0.3s ease; }
    .jmsg.juser { align-items: flex-end; }
    .jmsg.jbot { align-items: flex-start; }
    .jlabel { font-family: 'Orbitron', monospace; font-size: 0.5rem; letter-spacing: 2px; margin-bottom: 3px; color: rgba(0,200,255,0.5); }
    .jbubble { max-width: 85%; padding: 8px 12px; font-size: 0.85rem; line-height: 1.4; }
    .juser .jbubble { background: rgba(0,200,255,0.15); border: 1px solid rgba(0,200,255,0.4); color: #a0e8ff; border-radius: 4px 4px 0 4px; }
    .jbot .jbubble { background: rgba(0,40,60,0.8); border: 1px solid rgba(0,200,255,0.2); color: #00c8ff; border-radius: 4px 4px 4px 0; text-shadow: 0 0 8px rgba(0,200,255,0.3); }
    .jtime { font-size: 0.5rem; color: rgba(0,200,255,0.3); margin-top: 3px; }

    .orb-wrap { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; z-index: 2; }
    .orb-ring { position: absolute; width: 90px; height: 90px; border-radius: 50%; border: 1px solid rgba(0,200,255,0.2); animation: orb-expand 2s ease-out infinite; pointer-events: none; }
    .orb-ring:nth-child(2) { animation-delay: 0.7s; }
    @keyframes orb-expand { 0% { transform: scale(0.9); opacity: 0.8; } 100% { transform: scale(1.8); opacity: 0; } }

    #jarvis-voice-btn { width: 72px; height: 72px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(0,200,255,0.3), rgba(0,50,80,0.9)); border: 2px solid rgba(0,200,255,0.6); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.7rem; transition: all 0.3s; box-shadow: 0 0 20px rgba(0,200,255,0.3); outline: none; }
    #jarvis-voice-btn.listening { background: radial-gradient(circle at 35% 35%, rgba(255,60,60,0.4), rgba(80,0,0,0.9)); border-color: rgba(255,100,100,0.8); box-shadow: 0 0 30px rgba(255,60,60,0.5); animation: jlisten 1s ease-in-out infinite; }
    @keyframes jlisten { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    #jarvis-status { margin-top: 8px; font-family: 'Orbitron', monospace; font-size: 0.58rem; letter-spacing: 3px; color: rgba(0,200,255,0.6); text-transform: uppercase; min-height: 16px; position: relative; z-index: 2; }
    .wave-bars { display: none; gap: 3px; align-items: center; height: 16px; margin-top: 6px; position: relative; z-index: 2; }
    .wave-bars.active { display: flex; }
    .wave-bar { width: 3px; background: #00c8ff; border-radius: 2px; animation: wave 0.8s ease-in-out infinite; }
    .wave-bar:nth-child(1) { height: 5px; } .wave-bar:nth-child(2) { height: 12px; animation-delay: 0.1s; } .wave-bar:nth-child(3) { height: 16px; animation-delay: 0.2s; } .wave-bar:nth-child(4) { height: 12px; animation-delay: 0.3s; } .wave-bar:nth-child(5) { height: 5px; animation-delay: 0.4s; }
    @keyframes wave { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }

    #jarvis-clear-btn { background: transparent; border: 1px solid rgba(255,60,60,0.3); color: rgba(255,60,60,0.6); padding: 5px 14px; font-family: 'Orbitron', monospace; font-size: 0.5rem; letter-spacing: 2px; cursor: pointer; border-radius: 2px; margin-top: 8px; transition: all 0.3s; position: relative; z-index: 2; }

    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(0,212,170,0.4); } 50% { box-shadow: 0 0 0 8px rgba(0,212,170,0); } }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; } 40% { transform: scale(1.2); opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="avatar">🤖</div>
      <div class="header-info">
        <h1>Zara AI Agent</h1>
        <p><span class="dot"></span>Online • Ready</p>
      </div>
    </div>
    <div class="modes">
      <button class="mode-btn active-chat" data-mode="chat" onclick="setMode('chat')">💬 Chat</button>
      <button class="mode-btn" data-mode="search" onclick="setMode('search')">🔍 Search</button>
      <button class="mode-btn" data-mode="study" onclick="setMode('study')">📚 Study</button>
      <button class="mode-btn" data-mode="voice" onclick="setMode('voice')">🎙️ Voice</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div id="voice-panel">
    <h1 class="jarvis-title">J.A.R.V.I.S</h1>
    <p class="jarvis-subtitle">VOICE ASSISTANT</p>
    <div id="jarvis-chat-history">
      <div class="chat-header-log">// CONVERSATION LOG //</div>
      <div id="jarvis-messages">
        <div class="jmsg jbot">
          <span class="jlabel">JARVIS</span>
          <div class="jbubble">Good day. Voice mode active. How may I assist you, sir?</div>
          <span class="jtime">SYSTEM ONLINE</span>
        </div>
      </div>
    </div>
    <div class="orb-wrap">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <button id="jarvis-voice-btn">🎙️</button>
    </div>
    <div id="jarvis-status">AWAITING COMMAND</div>
    <div class="wave-bars" id="jarvis-wave">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <button id="jarvis-clear-btn">⚠ CLEAR LOG</button>
  </div>

  <div class="input-area" id="text-input-area">
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Kuch bhi poochho..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
    <p class="hint">Tap ➤ to send</p>
  </div>
</div>

<script>
const GROQ_KEY = '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';
const API_URL = 'https://api.groq.com/openai/v1/chat/completions';
const SYSTEM = `Tu ek helpful AI agent hai jiska naam Zara hai. Tu Hindi aur English dono mein baat kar sakta hai. Teen kaam karta hai: Chat, Search info, Study Help. Simple, friendly aur clear jawab de. Emojis thoda use kar.`;

let currentMode = 'chat';
let isLoading = false;
const placeholders = { chat: 'Kuch bhi poochho...', search: 'Kya search karein?', study: 'Kya padhai karni hai?' };
const modeLabels = { chat: '💬 Chat', search: '🔍 Search', study: '📚 Study', voice: '🎙️ Voice' };

window.onload = () => {
  addMsg('assistant', '👋 Salaam! Main <strong>Zara</strong> hoon — tera personal AI agent!\n\n💬 <strong>Chat</strong> — koi bhi sawaal\n🔍 <strong>Search</strong> — info dhundho\n📚 <strong>Study</strong> — padhai help\n🎙️ <strong>Voice</strong> — Jarvis voice mode\n\nShuru karo! 🚀');
  initVoice();
};

function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.className = 'mode-btn';
    if (b.dataset.mode === m) b.classList.add('active-' + m);
  });
  const vp = document.getElementById('voice-panel');
  const msg = document.getElementById('messages');
  const ia = document.getElementById('text-input-area');
  if (m === 'voice') {
    vp.classList.add('active'); msg.style.display = 'none'; ia.style.display = 'none';
  } else {
    vp.classList.remove('active'); msg.style.display = 'flex'; ia.style.display = 'block';
    document.getElementById('input').placeholder = placeholders[m];
  }
}

function addMsg(role, content, mode) {
  const box = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.innerHTML = content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  if (role === 'user' && mode) {
    const tag = document.createElement('div');
    tag.className = 'mode-tag';
    tag.textContent = modeLabels[mode];
    bubble.appendChild(tag);
  }
  row.appendChild(bubble);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'typing-row'; row.id = 'typing';
  row.innerHTML = '<div class="typing-bubble"><div class="dot-bounce"></div><div class="dot-bounce"></div><div class="dot-bounce"></div></div>';
  box.appendChild(row); box.scrollTop = box.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isLoading) return;
  addMsg('user', text, currentMode);
  input.value = ''; input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();
  const hint = currentMode === 'study' ? ' Study help chahiye, clearly explain karo with examples.' : currentMode === 'search' ? ' Latest accurate info do.' : '';
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: [{ role: 'system', content: SYSTEM + hint }, { role: 'user', content: text }], max_tokens: 800, temperature: 0.7 })
    });
    const data = await res.json();
    hideTyping();
    addMsg('assistant', data.choices?.[0]?.message?.content || 'Kuch galat hua, dobara try karo.');
  } catch (e) { hideTyping(); addMsg('assistant', 'Internet check karo aur dobara try karo.'); }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 90) + 'px'; }

function initVoice() {
  const msgsEl = document.getElementById('jarvis-messages');
  const histEl = document.getElementById('jarvis-chat-history');
  const vBtn = document.getElementById('jarvis-voice-btn');
  const statEl = document.getElementById('jarvis-status');
  const waveEl = document.getElementById('jarvis-wave');
  const clrBtn = document.getElementById('jarvis-clear-btn');
  let jHist = [], listening = false;

  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.pitch = 0.7; u.rate = 0.85; u.volume = 1;
    const v = window.speechSynthesis.getVoices().find(x => x.name.includes('Male') || x.name.includes('David') || x.name.includes('Daniel'));
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  }

  function addJ(text, sender) {
    const t = new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
    const isU = sender === 'user';
    const d = document.createElement('div');
    d.className = `jmsg ${isU ? 'juser' : 'jbot'}`;
    d.innerHTML = `<span class="jlabel">${isU ? 'YOU' : 'JARVIS'}</span><div class="jbubble">${text}</div><span class="jtime">${t}</span>`;
    msgsEl.appendChild(d); histEl.scrollTop = histEl.scrollHeight;
    jHist.push({ sender, text, t });
  }

  function reply(txt) {
    statEl.textContent = 'PROCESSING...';
    const l = txt.toLowerCase();
    let r = '';
    if (l.includes('hello') || l.includes('hi') || l.includes('namaste')) r = "Hello sir. All systems operational. How can I assist?";
    else if (l.includes('time')) r = `Current time is ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}, sir.`;
    else if (l.includes('date') || l.includes('aaj')) r = `Today is ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}, sir.`;
    else if (l.includes('joke') || l.includes('mazak')) r = "Why do programmers prefer dark mode? Because light attracts bugs, sir.";
    else if (l.includes('thank') || l.includes('shukriya')) r = "My pleasure, sir. That is what I am here for.";
    else if (l.includes('bye') || l.includes('alvida')) r = "Goodbye sir. J.A.R.V.I.S. standing by.";
    else { const f = ["Understood, sir. I will look into that.","Noted, sir. Processing your request.","Very well, sir. Analyzing your query.","Acknowledged. Request received, sir."]; r = f[Math.floor(Math.random()*f.length)]; }
    setTimeout(() => { addJ(r, 'jarvis'); speak(r); statEl.textContent = 'AWAITING COMMAND'; }, 600);
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    const rec = new SR();
    rec.continuous = false; rec.interimResults = false; rec.lang = 'en-US';
    rec.onstart = () => { listening = true; vBtn.classList.add('listening'); vBtn.textContent = '🔴'; statEl.textContent = 'LISTENING...'; waveEl.classList.add('active'); };
    rec.onresult = e => { const t = e.results[0][0].transcript; addJ(t, 'user'); reply(t); };
    rec.onerror = e => { statEl.textContent = 'ERROR: ' + e.error.toUpperCase(); reset(); };
    rec.onend = reset;
    vBtn.addEventListener('click', () => { if (listening) rec.stop(); else rec.start(); });
  } else { vBtn.style.opacity = '0.5'; statEl.textContent = 'VOICE UNAVAILABLE'; }

  function reset() { listening = false; vBtn.classList.remove('listening'); vBtn.textContent = '🎙️'; statEl.textContent = 'AWAITING COMMAND'; waveEl.classList.remove('active'); }

  clrBtn.addEventListener('click', () => {
    if (confirm('Clear conversation log?')) {
      jHist = []; msgsEl.innerHTML = '';
      const m = "Log cleared. Ready for new session, sir.";
      addJ(m, 'jarvis'); speak(m);
    }
  });
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
</script>
</body>
</html>
